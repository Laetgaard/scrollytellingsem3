<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scrollytelling</title>
    <link rel="stylesheet" href="forside.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
<section class="scroll-section">

    <video id="video1" muted playsinline preload="auto">
        <source src="landskab3.mp4" type="video/mp4">
    </video>

    <video id="video2" muted playsinline preload="auto">
        <source src="landskab2.mp4" type="video/mp4">
    </video>

    <h1 id="title1" class="overlay center">Min idé startede her</h1>

    <div id="section2" class="overlay left">
        <h2>Den første mulighed</h2>
        <img src="images/DSC_3074.jpg" alt="">
    </div>

    <div id="section3" class="overlay left">
        <h2>Jeg begyndte at bygge</h2>
        <p>AI gjorde det muligt</p>
        <img class="slideImg" src="img2.png">
    </div>

    <h2 id="section4" class="overlay left">Ideen bliver til virkelighed</h2>

    <h2 id="endTitle" class="overlay left">Rejsen fortsætter</h2>

</section>
<script src="forside.js"></script>
</body>
</html>
