<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scrollytelling</title>
    <link rel="stylesheet" href="forside.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
<section class="scroll-section">

    <video id="video1" muted playsinline preload="auto">
        <source src="landskab3.mp4" type="video/mp4">
    </video>

    <video id="video2" muted playsinline preload="auto">
        <source src="landskab2.mp4" type="video/mp4">
    </video>

    <h1 id="title1" class="overlay center">Rejsen fra ide til virkelighed</h1>

    <div id="section2" class="overlay left">
        <h2>Arbejdede hårdt på ideen</h2>
        <img src="images/DSC_3074.jpg" alt="">
    </div>

    <div id="section3" class="overlay left">
        <h2>Skabelsen af ideen.</h2>
        <p>Efter flere og flere fejl som blev til læringer.</p>
        <img class="slideImg" src="images/DSC_3172.jpg" alt="">
    </div>

    <div id="section4" class="overlay left">
        <h2>Så slog det klik, og ideen blev til virkelighed.</h2>
        <p>Efter flere og flere fejl som blev til læringer.</p>
        <img src="images/DSC_3220.jpg" alt="">
    </div>

    <h2 id="endTitle" class="overlay left">Ideen voksede, men rejsen fortsætter</h2>

</section>
<script src="forside.js"></script>
</body>
</html>
